input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Parse timestamp from payload
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Route to index based on log_type
  if [log_type] == "scan_request" {
    mutate { add_field => { "[@metadata][index]" => "vulnlab-scans" } }
  } else if [log_type] == "agent_step" {
    mutate { add_field => { "[@metadata][index]" => "vulnlab-agent" } }
  } else if [log_type] == "probe_result" {
    mutate { add_field => { "[@metadata][index]" => "vulnlab-probes" } }
  } else if [log_type] == "scan_result" {
    mutate { add_field => { "[@metadata][index]" => "vulnlab-results" } }
  } else if [log_type] == "session_complete" {
    mutate { add_field => { "[@metadata][index]" => "vulnlab-scans" } }
  } else {
    mutate { add_field => { "[@metadata][index]" => "vulnlab-general" } }
  }

  # Severity numeric field for range queries and sorting
  if [severity] == "critical" {
    mutate { add_field => { "severity_num" => 4 } }
  } else if [severity] == "high" {
    mutate { add_field => { "severity_num" => 3 } }
  } else if [severity] == "medium" {
    mutate { add_field => { "severity_num" => 2 } }
  } else if [severity] == "low" {
    mutate { add_field => { "severity_num" => 1 } }
  } else {
    mutate { add_field => { "severity_num" => 0 } }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{[@metadata][index]}-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
